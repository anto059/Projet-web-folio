<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Portfolio - Szajwaj</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #6A4C93;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    
    /* Style du titre principal */
    header h1 {
      color: #ffffff;
      font-weight: bold;
      font-family: 'Georgia', serif;
      font-size: 48px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      margin: 20px 0;
    }
    
    /* Style des blocs de contenu */
    .content-section {
      background-color: #8B6BA3;
      border-radius: 10px;
      padding: 20px;
      margin: 20px auto;
      max-width: 600px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    }
    
    .content-section h2 {
      color: #ffffff;
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 28px;
      margin-top: 0;
      margin-bottom: 15px;
      border-bottom: 2px solid #FFB6D9;
      padding-bottom: 10px;
    }
    
    .content-section p {
      color: #ffffff;
      font-family: 'Verdana', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      margin: 0;
    }
    
    /* Style du bouton portfolio */
    .portfolio-block {
      background: linear-gradient(135deg, #FFB6D9 0%, #FFDDC1 100%);
      border: 3px solid #FF69B4;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .portfolio-block:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 12px rgba(255, 107, 180, 0.4);
    }
    
    .portfolio-label {
      color: #6A4C93 !important;
      font-weight: bold;
      font-family: 'Georgia', serif;
    }
  </style>
</head>
<body>
  <header>
    <h1><center>Page d'accueil</center></h1>
  </header>

  <!-- Section Présentation -->
  <div class="content-section">
    <h2>Présentation</h2>
    <p>Présentation du projet</p>
  </div>

  <!-- Section Objectif -->
  <div class="content-section">
    <h2>Objectif</h2>
    <p>Objectif du projet</p>
  </div>

  <!-- Section Troisième bloc -->
  <div class="content-section">
    <h2>Détails</h2>
    <p>Informations complémentaires du projet</p>
  </div>

  <div id="portfolio-container"></div>

  <script src="portfolio.js"></script>
</body>
</html>
